<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>イベント販売管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown-dark:  #4a2c1a;
      --brown-mid:   #7b4f35;
      --brown-light: #c8a882;
      --cream:       #f7f2ec;
      --cream-dark:  #ede5d9;
      --red:         #d94040;
      --text:        #2d1f14;
      --text-sub:    #7a6050;
      --header-h:    52px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 20px;
    }

    .header {
      position: sticky; top: 0; z-index: 100;
      height: var(--header-h);
      background: var(--brown-dark);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 700;
      letter-spacing: .04em;
    }

    .product-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border-left: 4px solid transparent;
    }
    .product-card.stock-zero { border-left-color: var(--red); }
    .product-card.stock-low  { border-left-color: var(--brown-light); }

    .prod-info { flex: 1; min-width: 0; }
    .prod-name {
      font-size: 15px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .prod-price { font-size: 14px; color: var(--brown-mid); margin-top: 2px; font-weight: 600; }
    .prod-stock { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
    .prod-stock.warn { color: var(--red); font-weight: 700; }

    .qty-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .qty-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      font-size: 22px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .qty-btn.minus { background: var(--cream-dark); color: var(--text-sub); }
    .qty-btn.plus  { background: var(--brown-dark);  color: #fff; }
    .qty-val {
      min-width: 34px; text-align: center;
      font-size: 20px; font-weight: 800;
      color: var(--text);
    }
    .qty-val.neg { color: var(--red); }

    #main { padding: 14px; }

    .submit-btn {
      width: 100%; padding: 16px;
      background: var(--brown-dark); color: #fff;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-top: 6px;
      transition: opacity .2s;
    }
    .submit-btn:disabled { opacity: .5; cursor: default; }
    .submit-btn:active   { opacity: .8; }

    .toast {
      position: fixed; top: calc(var(--header-h) + 10px); left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: rgba(0,0,0,.82); color: #fff;
      padding: 10px 20px; border-radius: 10px; font-size: 14px;
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">販売入力</div>
<div class="toast" id="toast"></div>

<div id="main">
  <div id="productList"></div>
  <button class="submit-btn" id="submitBtn" onclick="submitSales()">送信</button>
</div>

<script>
let products   = [];
let quantities = {};

(async function init() { await loadProducts(); })();

async function loadProducts() {
  try {
    const res = await fetch('/api/products');
    products = await res.json();
    renderProductList();
  } catch { showToast('商品データの読み込みに失敗しました'); }
}

function renderProductList() {
  document.getElementById('productList').innerHTML = products.map(p => {
    const qty = quantities[p.id] || 0;
    const stockClass = p.remainingStock <= 0 ? 'stock-zero' : p.remainingStock <= 3 ? 'stock-low' : '';
    const stockWarn  = p.remainingStock <= 0
      ? '<span class="warn">⚠ 在庫なし</span>'
      : p.remainingStock <= 3
        ? `<span class="warn">残${p.remainingStock}個（残少）</span>`
        : `残${p.remainingStock}個`;
    return `
      <div class="product-card ${stockClass}">
        <div class="prod-info">
          <div class="prod-name">${e(p.name)}</div>
          <div class="prod-price">¥${fmt(p.price)}</div>
          <div class="prod-stock">${stockWarn}</div>
        </div>
        <div class="qty-wrap">
          <button class="qty-btn minus" ontouchstart="" onclick="changeQty(${p.id},-1)">−</button>
          <span class="qty-val ${qty < 0 ? 'neg' : ''}" id="qv-${p.id}">${qty}</span>
          <button class="qty-btn plus"  ontouchstart="" onclick="changeQty(${p.id}, 1)">＋</button>
        </div>
      </div>`;
  }).join('');
}

function changeQty(id, delta) {
  quantities[id] = (quantities[id] || 0) + delta;
  const el = document.getElementById(`qv-${id}`);
  el.textContent = quantities[id];
  el.className = 'qty-val' + (quantities[id] < 0 ? ' neg' : '');
}

async function submitSales() {
  const items = Object.entries(quantities)
    .filter(([, q]) => q !== 0)
    .map(([id, quantity]) => ({ productId: +id, quantity }));

  if (!items.length) { showToast('数量を入力してください'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '送信中…';

  try {
    const res  = await fetch('/api/sales/batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items }),
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || '送信エラー'); return; }

    showToast(`送信完了（${data.count}件）✓`);
    quantities = {};
    await loadProducts();
  } catch { showToast('送信エラー'); }
  finally { btn.disabled = false; btn.textContent = '送信'; }
}

function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }
function e(s)   { return String(s).replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2600);
}
</script>
</body>
</html>
